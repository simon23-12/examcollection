<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>English Exam Collection | LMG</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #10223b;
        --blue: #0966ad;
        --orange: #ee9400;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        font-family: "Avenir Next", Avenir, "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
      }

      .hero {
        isolation: isolate;
        position: relative;
        display: grid;
        min-height: 100vh;
        place-items: center;
        overflow: hidden;
        background: #193d5d;
      }

      .hero__video,
      .hero__shade,
      .hero__fade {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .hero__video {
        z-index: -3;
        object-fit: cover;
        object-position: center;
      }

      .hero__shade {
        z-index: -2;
        background: linear-gradient(110deg, rgba(6, 30, 53, 0.47), rgba(6, 30, 53, 0.12) 57%, rgba(6, 30, 53, 0.34));
      }

      /* Soft white light at both upper corners keeps the navigation legible. */
      .hero__fade {
        z-index: -1;
        pointer-events: none;
        background:
          radial-gradient(circle 24rem at 0 0, #fff 0%, #fff 48%, rgba(255, 255, 255, 0.97) 55%, rgba(255, 255, 255, 0.83) 67%, rgba(255, 255, 255, 0.55) 79%, rgba(255, 255, 255, 0.22) 90%, rgba(255, 255, 255, 0) 100%),
          radial-gradient(circle 24rem at 100% 0, #fff 0%, #fff 48%, rgba(255, 255, 255, 0.97) 55%, rgba(255, 255, 255, 0.83) 67%, rgba(255, 255, 255, 0.55) 79%, rgba(255, 255, 255, 0.22) 90%, rgba(255, 255, 255, 0) 100%);
      }

      .nav {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
        display: flex;
        width: 100%;
        align-items: flex-start;
        justify-content: space-between;
        padding: clamp(0.8rem, 1.8vw, 1.5rem) clamp(0.9rem, 2.2vw, 2rem);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: clamp(0.55rem, 1.3vw, 1.1rem);
        text-decoration: none;
      }

      .brand img {
        width: clamp(3.75rem, 6vw, 5.25rem);
        height: auto;
      }

      .brand__title {
        margin: 0;
        color: var(--ink);
        font-size: clamp(1.05rem, 2.1vw, 1.75rem);
        font-weight: 800;
        letter-spacing: -0.045em;
        line-height: 1;
        text-shadow: 0 0.1rem 0.75rem rgba(255, 255, 255, 0.8);
      }

      .brand__title-accent {
        color: var(--orange);
      }

      .login-button {
        border: 1px solid rgba(16, 34, 59, 0.17);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 0.45rem 1.3rem rgba(16, 34, 59, 0.12);
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        font-size: 0.93rem;
        font-weight: 700;
        letter-spacing: 0.025em;
        padding: 0.78rem 1.35rem;
        transition: background 180ms ease, color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
      }

      .login-button:hover,
      .login-button:focus-visible {
        background: var(--blue);
        box-shadow: 0 0.7rem 1.6rem rgba(9, 102, 173, 0.28);
        color: white;
        outline: none;
        transform: translateY(-2px);
      }

      dialog {
        width: min(92vw, 25rem);
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1.5rem 4.5rem rgba(7, 24, 43, 0.28);
        color: var(--ink);
        padding: 2rem;
      }

      dialog::backdrop { background: rgba(4, 20, 37, 0.58); }
      dialog h2 { margin: 0; font-size: 1.5rem; }
      dialog p { color: #536375; line-height: 1.5; }
      .dialog-actions { display: flex; justify-content: flex-end; margin-top: 1.5rem; }
      .dialog-actions button { border: 0; border-radius: 0.55rem; background: var(--blue); color: white; cursor: pointer; font: inherit; font-weight: 700; padding: 0.65rem 1rem; }

      @media (max-width: 450px) {
        .nav { padding: 0.7rem; }
        .brand img { width: 3.7rem; }
        .brand { gap: 0.45rem; }
        .brand__title { font-size: 0.9rem; }
        .login-button { font-size: 0.82rem; padding: 0.65rem 1rem; }
      }

      @media (prefers-reduced-motion: reduce) {
        .hero__video { display: none; }
        .hero { background: linear-gradient(135deg, #163f63, #0c6fae); }
        * { scroll-behavior: auto !important; transition-duration: 0.01ms !important; }
      }

      body.app-open { overflow: auto; }

      .login-form { display: flex; flex-direction: column; gap: 0.9rem; margin-top: 1.25rem; }
      .login-form label { font-size: 0.85rem; font-weight: 700; color: var(--ink); display: block; margin-bottom: 0.3rem; }
      .login-form input {
        width: 100%;
        border: 1px solid rgba(16, 34, 59, 0.2);
        border-radius: 0.55rem;
        padding: 0.6rem 0.75rem;
        font: inherit;
      }
      .login-error { color: #b3261e; font-size: 0.85rem; min-height: 1.2em; margin: 0; }
      .dialog-actions { gap: 0.6rem; }
      .dialog-actions button[value="cancel"] { background: transparent; color: var(--ink); border: 1px solid rgba(16, 34, 59, 0.2); }

      .app-section { display: none; position: relative; isolation: isolate; min-height: 100vh; }
      .app-section.open { display: block; }

      .app__video, .app__shade {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .app__video { z-index: -3; object-fit: cover; object-position: center; }
      .app__shade {
        z-index: -2;
        background: linear-gradient(110deg, rgba(6, 30, 53, 0.6), rgba(6, 30, 53, 0.3) 57%, rgba(6, 30, 53, 0.5));
      }

      .app__nav {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 2;
        display: flex;
        width: 100%;
        align-items: center;
        justify-content: space-between;
        padding: clamp(0.8rem, 1.8vw, 1.5rem) clamp(0.9rem, 2.2vw, 2rem);
        background: rgba(16, 34, 59, 0.35);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }
      .app__nav .brand__title { color: white; text-shadow: none; }

      .logout-button {
        border: 1px solid rgba(255, 255, 255, 0.4);
        background: rgba(255, 255, 255, 0.12);
        color: white;
        border-radius: 999px;
        padding: 0.55rem 1.1rem;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: background 180ms ease;
      }
      .logout-button:hover { background: rgba(255, 255, 255, 0.24); }

      .app__content {
        position: relative;
        z-index: 1;
        max-width: 52rem;
        margin: 0 auto;
        padding: calc(clamp(0.8rem, 1.8vw, 1.5rem) * 2 + 4.5rem) 1.5rem 4rem;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(6px);
        border-radius: 1.1rem;
        box-shadow: 0 1.5rem 4rem rgba(6, 20, 40, 0.35);
      }

      .upload-card { padding: 1.5rem; margin-bottom: 2rem; }
      .upload-card h3 { margin-top: 0; }
      .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; margin-bottom: 1rem; }
      .upload-grid label { font-size: 0.85rem; font-weight: 700; display: block; margin-bottom: 0.3rem; }
      .upload-grid input { width: 100%; border: 1px solid rgba(16, 34, 59, 0.2); border-radius: 0.5rem; padding: 0.55rem 0.7rem; font: inherit; }
      .upload-submit { border: 0; border-radius: 0.55rem; background: var(--blue); color: white; font: inherit; font-weight: 700; padding: 0.7rem 1.2rem; cursor: pointer; }
      .upload-status { font-size: 0.85rem; margin-top: 0.7rem; min-height: 1.2em; }

      .app__list-heading { color: white; text-shadow: 0 0.1rem 0.6rem rgba(0, 0, 0, 0.35); margin-bottom: 0.9rem; }

      .exam-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.6rem; }
      .exam-row { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 0.25rem; border-bottom: 1px solid rgba(16, 34, 59, 0.1); }
      .exam-row:last-child { border-bottom: none; }
      .exam-row__meta { display: flex; flex-direction: column; }
      .exam-row__title { font-weight: 700; }
      .exam-row__sub { font-size: 0.8rem; color: #607085; }
      .exam-row__actions { display: flex; gap: 0.5rem; }
      .exam-row__actions a, .exam-row__actions button {
        border: 1px solid rgba(16, 34, 59, 0.2); background: white; border-radius: 999px;
        padding: 0.4rem 0.85rem; font: inherit; font-size: 0.8rem; font-weight: 700; cursor: pointer; text-decoration: none; color: var(--ink);
      }

      @media (max-width: 550px) {
        .upload-grid { grid-template-columns: 1fr; }
      }

      @media (prefers-reduced-motion: reduce) {
        .app__video { display: none; }
        .app-section { background: linear-gradient(135deg, #163f63, #0c6fae); }
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <video class="hero__video" autoplay muted loop playsinline aria-hidden="true">
        <source src="2880734-hd-1920-1080-24fps1(1).mp4" type="video/mp4" />
      </video>
      <div class="hero__shade"></div>
      <div class="hero__fade"></div>

      <nav class="nav" aria-label="Main navigation">
        <a class="brand" href="/" aria-label="LMG home">
          <img src="schoollogo.png" alt="LMG school logo" />
          <h1 class="brand__title"><span class="brand__title-accent">English</span> Exam Collection</h1>
        </a>
        <button class="login-button" type="button" id="login-trigger">Log in</button>
      </nav>
    </main>

    <dialog id="login-dialog" aria-labelledby="login-title">
      <h2 id="login-title">Teacher login</h2>
      <p>Use the shared exam-collection login shared with English department staff.</p>
      <form id="login-form" class="login-form">
        <div>
          <label for="login-email">Email</label>
          <input id="login-email" type="email" required autocomplete="username" />
        </div>
        <div>
          <label for="login-password">Password</label>
          <input id="login-password" type="password" required autocomplete="current-password" />
        </div>
        <p class="login-error" id="login-error"></p>
        <div class="dialog-actions">
          <button type="button" value="cancel" id="login-cancel">Cancel</button>
          <button type="submit">Log in</button>
        </div>
      </form>
    </dialog>

    <section class="app-section" id="app-section">
      <video class="app__video" autoplay muted loop playsinline aria-hidden="true">
        <source src="19896618-uhd-3840-2160-24fps.mp4" type="video/mp4" />
      </video>
      <div class="app__shade"></div>

      <nav class="app__nav" aria-label="App navigation">
        <a class="brand" href="/" aria-label="LMG home">
          <img src="schoollogo.png" alt="LMG school logo" />
          <h1 class="brand__title"><span class="brand__title-accent">English</span> Exam Collection</h1>
        </a>
        <button class="logout-button" id="logout-button">Log out</button>
      </nav>

      <div class="app__content">
      <div class="upload-card glass-card">
        <h3>Upload an exam</h3>
        <form id="upload-form">
          <div class="upload-grid">
            <div>
              <label for="exam-title">Title</label>
              <input id="exam-title" type="text" required placeholder="e.g. Year 10 Mock 2026" />
            </div>
            <div>
              <label for="exam-level">Level / class</label>
              <input id="exam-level" type="text" placeholder="e.g. 10a" />
            </div>
          </div>
          <div style="margin-bottom: 1rem;">
            <label for="exam-file">File (doc, docx, mp3)</label>
            <input id="exam-file" type="file" required accept=".doc,.docx,.mp3" />
          </div>
          <button class="upload-submit" type="submit">Upload</button>
          <p class="upload-status" id="upload-status"></p>
        </form>
      </div>

      <h3 class="app__list-heading">Available exams</h3>
      <div class="glass-card" style="padding: 0.5rem 1rem;">
        <ul class="exam-list" id="exam-list"></ul>
      </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = 'https://lnmncvmxrbboyppfxcih.supabase.co';
      const SUPABASE_KEY = 'sb_publishable_ekLCvS9EN6V1xN01qg9vKw_fbUKUq8M';
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const BUCKET = 'exams';

      const loginTrigger = document.querySelector('#login-trigger');
      const loginDialog = document.querySelector('#login-dialog');
      const loginForm = document.querySelector('#login-form');
      const loginError = document.querySelector('#login-error');
      const loginCancel = document.querySelector('#login-cancel');
      const appSection = document.querySelector('#app-section');
      const logoutButton = document.querySelector('#logout-button');
      const uploadForm = document.querySelector('#upload-form');
      const uploadStatus = document.querySelector('#upload-status');
      const examList = document.querySelector('#exam-list');

      loginTrigger.addEventListener('click', () => {
        loginError.textContent = '';
        loginDialog.showModal();
      });

      loginCancel.addEventListener('click', () => loginDialog.close());

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        loginError.textContent = '';
        const email = document.querySelector('#login-email').value;
        const password = document.querySelector('#login-password').value;
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
          loginError.textContent = 'Login failed. Check email and password.';
          return;
        }
        loginForm.reset();
        loginDialog.close();
        showApp();
      });

      logoutButton.addEventListener('click', async () => {
        await sb.auth.signOut();
        appSection.classList.remove('open');
        document.body.classList.remove('app-open');
      });

      async function showApp() {
        appSection.classList.add('open');
        document.body.classList.add('app-open');
        appSection.scrollIntoView({ behavior: 'smooth' });
        await loadExams();
      }

      async function loadExams() {
        examList.innerHTML = '<li>Loading…</li>';
        const { data, error } = await sb
          .from('exams')
          .select('*')
          .order('uploaded_at', { ascending: false });

        if (error) {
          examList.innerHTML = '<li>Could not load exams.</li>';
          return;
        }

        if (!data.length) {
          examList.innerHTML = '<li>No exams uploaded yet.</li>';
          return;
        }

        examList.innerHTML = '';
        for (const exam of data) {
          const li = document.createElement('li');
          li.className = 'exam-row';
          li.innerHTML = `
            <div class="exam-row__meta">
              <span class="exam-row__title">${escapeHtml(exam.title)}</span>
              <span class="exam-row__sub">${escapeHtml(exam.level || '')} · ${escapeHtml(exam.file_name)}</span>
            </div>
            <div class="exam-row__actions">
              <a href="#" data-path="${exam.file_path}" class="download-link">Download</a>
              <button type="button" data-id="${exam.id}" data-path="${exam.file_path}" class="delete-button">Delete</button>
            </div>
          `;
          examList.appendChild(li);
        }

        examList.querySelectorAll('.download-link').forEach((a) => {
          a.addEventListener('click', async (e) => {
            e.preventDefault();
            const { data, error } = await sb.storage.from(BUCKET).createSignedUrl(a.dataset.path, 60);
            if (!error && data) window.open(data.signedUrl, '_blank');
          });
        });

        examList.querySelectorAll('.delete-button').forEach((btn) => {
          btn.addEventListener('click', async () => {
            if (!confirm('Delete this exam for everyone?')) return;
            await sb.storage.from(BUCKET).remove([btn.dataset.path]);
            await sb.from('exams').delete().eq('id', btn.dataset.id);
            loadExams();
          });
        });
      }

      uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.querySelector('#exam-title').value;
        const level = document.querySelector('#exam-level').value;
        const fileInput = document.querySelector('#exam-file');
        const file = fileInput.files[0];
        if (!file) return;

        uploadStatus.textContent = 'Uploading…';
        const path = `${crypto.randomUUID()}-${file.name}`;

        const { error: uploadError } = await sb.storage.from(BUCKET).upload(path, file);
        if (uploadError) {
          uploadStatus.textContent = 'Upload failed: ' + uploadError.message;
          return;
        }

        const { error: insertError } = await sb.from('exams').insert({
          title,
          level,
          file_path: path,
          file_name: file.name,
        });

        if (insertError) {
          uploadStatus.textContent = 'Saved file but failed to record it: ' + insertError.message;
          return;
        }

        uploadStatus.textContent = 'Uploaded.';
        uploadForm.reset();
        loadExams();
      });

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // Restore session on page load (e.g. after refresh)
      sb.auth.getSession().then(({ data }) => {
        if (data.session) showApp();
      });
    </script>
  </body>
</html>
